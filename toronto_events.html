<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="toronto_events.css">
</head>

<body>
    <div class="container">
        <div id="toronto-events"></div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "osm_standard.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", async () => {

            // 1. load markers
            const imageNames = [
                "finger",
                "hatch_diag"
            ];
            for (const name of imageNames) {
                const img = await map.loadImage(
                    `assets/markers/${name}.png`
                );
                if (!map.hasImage(name)) {
                    map.addImage(name, img.data);
                }
            }

            map.on("styleimagemissing", async (e) => {
                const id = e.id;
                try {
                    const img = await map.loadImage(
                        `assets/markers/${id}.png`
                    );
                    if (!map.hasImage(id)) {
                        map.addImage(id, img.data);
                    }
                } catch (err) {
                    console.error(
                        "missing image failed:",
                        id,
                        err
                    );
                }
            });

            // 2. load geojson
            const res = await fetch("data/toronto_events.geojson");
            const geojson = await res.json();

            // 3. add source
            map.addSource("toronto-events", {
                type: "geojson",
                data: geojson
            });

            // 4. add symbol layer
            map.addLayer({
                id: "toronto-events",
                type: "symbol",
                source: "toronto-events",

                layout: {
                    "icon-image": "finger",
        "icon-size": 0.2,
                    "icon-anchor": "bottom",
                    "icon-allow-overlap": true,
                    "icon-ignore-placement": true
                }
            });

function getClosestEvent() {

    const center = map.getCenter();

    const features = map.querySourceFeatures("toronto-events");

    if (!features || !features.length) return null;

    let closest = null;
    let minDist = Infinity;

    for (const f of features) {

        if (!f.geometry?.coordinates) continue;

        const [lng, lat] = f.geometry.coordinates;

        const dx = lng - center.lng;
        const dy = lat - center.lat;

        const dist = dx * dx + dy * dy;

        if (dist < minDist) {
            minDist = dist;
            closest = f;
        }
    }

    return closest;
}

let closestPopup = null;

function showEventPopup(feature) {

    if (!feature) return;

    const [lng, lat] = feature.geometry.coordinates;
    const props = feature.properties;

    if (closestPopup) closestPopup.remove();

    closestPopup = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false,
        offset: 12
    })
        .setLngLat([lng, lat])
        .setHTML(`
            <p>${props.title ?? ""}</p>
        `)
        .addTo(map);
}

let activeId = null;

function setActiveMarker(feature) {

    if (!feature) return;

    const id = feature.properties?.id; // ✅ use properties ONLY

    if (!id || activeId === id) return;

    activeId = id;

    map.setLayoutProperty(
        "toronto-events",
        "icon-size",
        [
            "case",
            ["==", ["get", "id"], id],
            0.4,
            0.2
        ]
    );
}

function updateClosestEvent() {

    const closest = getClosestEvent();

    if (!closest) return;

    setActiveMarker(closest);
    showEventPopup(closest);

}

map.on("sourcedata", (e) => {

    if (
        e.sourceId === "toronto-events" &&
        e.isSourceLoaded
    ) {

        updateClosestEvent();

    }

});

map.on("moveend", () => {
    updateClosestEvent();
});

            map.on("click", (e) => {
                const features = map.queryRenderedFeatures(
                    e.point
                );
                console.log(features);
            });

//map.showCollisionBoxes = true;

        });

    </script>

</body>

</html>
