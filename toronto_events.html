<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="toronto_events.css">
</head>

<body>
    <div class="container">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
        <div id="infobox"></div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "osm_standard.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", async () => {

            // 1. load markers
            const imageNames = [
                "finger",
                "hatch_diag"
            ];
            for (const name of imageNames) {
                const img = await map.loadImage(
                    `assets/markers/${name}.png`
                );
                if (!map.hasImage(name)) {
                    map.addImage(name, img.data);
                }
            }

            map.on("styleimagemissing", async (e) => {
                const id = e.id;
                try {
                    const img = await map.loadImage(
                        `assets/markers/${id}.png`
                    );
                    if (!map.hasImage(id)) {
                        map.addImage(id, img.data);
                    }
                } catch (err) {
                    console.error(
                        "missing image failed:",
                        id,
                        err
                    );
                }
            });

            // 2. load geojson
            const res = await fetch("data/toronto_events.geojson");
            const geojson = await res.json();

            // 3. add source
            map.addSource("toronto-events", {
                type: "geojson",
                data: geojson
            });

            // 4. add symbol layer
map.addLayer({
    id: "toronto-events",
    type: "symbol",
    source: "toronto-events",
    layout: {
        "icon-image": "finger",
        "icon-size": 0.2
    }
});

map.addLayer({
    id: "toronto-events-active",
    type: "symbol",
    source: "toronto-events",
    filter: ["==", ["get", "id"], ""],
    layout: {
        "icon-image": "finger",
        "icon-size": 0.45
    }
});

function getClosestEvent() {

    const center = map.getCenter();

    const features = map.querySourceFeatures("toronto-events");

    if (!features || !features.length) return null;

    let closest = null;
    let minDist = Infinity;

    for (const f of features) {

        if (!f.geometry?.coordinates) continue;

        const [lng, lat] = f.geometry.coordinates;

        const dx = lng - center.lng;
        const dy = lat - center.lat;

        const dist = dx * dx + dy * dy;

        if (dist < minDist) {
            minDist = dist;
            closest = f;
        }
    }

    return closest;
}

let closestPopup = null;

function showEventPopup(feature) {

    if (!feature) return;

    const [lng, lat] = feature.geometry.coordinates;
    const props = feature.properties;

    if (closestPopup) closestPopup.remove();

    closestPopup = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false,
        offset: 12,
        anchor: 'bottom'
    })
        .setLngLat([lng, lat])
        .setHTML(`
            <p>${props.event_name ?? ""}</p>
        `)
        .addTo(map);
}

let activeId = null;

function setActiveMarker(feature) {

    if (!feature) return;

    const id = feature.properties?.id; // ✅ use properties ONLY

    if (!id || activeId === id) return;

    activeId = id;

map.setFilter("toronto-events-active", ["==", ["get", "id"], id]);
map.setFilter("toronto-events", ["!=", ["get", "id"], id]);
}

function updateInfobox(feature) {

    const box = document.getElementById("infobox");
    if (!box || !feature) return;

    const props = feature.properties || {};

    // ----------------------------
    // IMAGE (FIXED + SAFE)
    // ----------------------------
    let img = null;

    try {
        const raw = props.event_image;

        img = typeof raw === "string"
            ? JSON.parse(raw)?.[0]
            : raw?.[0];
    } catch (e) {
        img = null;
    }

    const imageUrl = img?.bin_id
        ? `https://secure.toronto.ca/c3api_upload/retrieve/festivals_events/${img.bin_id}`
        : null;

    // ----------------------------
    // HELPERS
    // ----------------------------
    const isValid = (v) => {
        if (v === null || v === undefined) return false;
        if (typeof v === "string" && v.trim() === "") return false;
        if (Array.isArray(v) && v.length === 0) return false;
        return true;
    };

    const format = (v) => {
        if (!isValid(v)) return "";

        if (Array.isArray(v)) {
            return v.join(", ");
        }

        if (typeof v === "object") {
            return Object.entries(v)
                .map(([k, val]) => {
                    const formatted = format(val);
                    return formatted ? `<div><strong>${k}:</strong> ${formatted}</div>` : "";
                })
                .filter(Boolean)
                .join("");
        }

        return v;
    };

    // ----------------------------
    // BUILD CONTENT
    // ----------------------------
    const entries = Object.entries(props)
        .filter(([_, v]) => isValid(v))
        .map(([key, value]) => `
            <section>
                <h4>${key}</h4>
                <div>${format(value)}</div>
            </section>
        `)
        .join("");

    // ----------------------------
    // RENDER
    // ----------------------------
    box.innerHTML = `
        <div class="infobox-content">

            ${imageUrl ? `
                <div class="infobox-image">
                    <img src="${imageUrl}"
                         alt="${img?.fields?.alt ?? ""}" />
                </div>
            ` : ""}

            ${entries}

        </div>
    `;
}

function updateClosestEvent() {

    const closest = getClosestEvent();

    if (!closest) return;

    setActiveMarker(closest);
    showEventPopup(closest);
    updateInfobox(closest);

}

map.on("sourcedata", (e) => {

    if (
        e.sourceId === "toronto-events" &&
        e.isSourceLoaded
    ) {

        updateClosestEvent();

    }

});

map.on("moveend", () => {
    updateClosestEvent();
});

            map.on("click", (e) => {
                const features = map.queryRenderedFeatures(
                    e.point
                );
                console.log(features);
            });

//map.showCollisionBoxes = true;

        });

    </script>

</body>

</html>
