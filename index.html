<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "standard.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", () => {

            // Add ward source
            map.addSource('toronto_wards', {
                type: 'vector',
                tiles: ['https://geographyclub.github.io/toronto-map/data/toronto_wards/{z}/{x}/{y}.pbf']
            });

            // Add ward centroids
            map.addSource('toronto_ward_centroids', {
                type: 'vector',
                tiles: ['https://geographyclub.github.io/toronto-map/data/toronto_ward_centroids/{z}/{x}/{y}.pbf']
            });

            // Add neighborhood source
            map.addSource('toronto_neighborhoods', {
                type: 'vector',
                tiles: ['https://torontotechweek.github.io/data/toronto_neighborhoods/{z}/{x}/{y}.pbf']
            });

            // Add neighborhood centroids
            map.addSource('toronto_neighborhoods_centroids', {
                'type': 'geojson',
                'data': 'https://torontotechweek.github.io/data/toronto_neighborhoods_centroids.geojson'
            });

            // Add ward outline
            map.addLayer({
                'id': 'ward-outlines',
                'source': 'toronto_wards',
                'source-layer': 'toronto_wards',
                'type': 'line',
                'paint': {
                    'line-color': 'hsl(202, 90%, 16%)',
                    'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1, 13, 3],
                    'line-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.4, 12, 0.4, 13, 0]
                }
            });

            // Add neighborhood outline
            map.addLayer({
                'id': 'neighborhood-outlines',
                'source': 'toronto_neighborhoods',
                'source-layer': 'toronto_neighborhoods',
                'type': 'line',
                'paint': {
                    'line-color': 'hsl(202, 90%, 16%)',
                    'line-width': ['interpolate', ['linear'], ['zoom'], 12, 1, 16, 3],
                    'line-opacity': ['interpolate', ['linear'], ['zoom'], 12, 0, 13, 0.4, 15, 0.4, 16, 0]
                }
            });
            
            // Add neighborhood labels
            map.addLayer({
                id: 'neighborhood-labels',
                type: 'symbol',
                source: 'toronto_neighborhoods_centroids',
                layout: {
                    'text-field': ['get', 'area_name'],
                    'text-size': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        12, 6,
                        16, 40
                    ],
                    'text-font': ['notosans'],
                    'text-max-width': 5,
                    'text-line-height': 1.2,
                    'text-allow-overlap': true,
                    'text-ignore-placement': false,
                    'text-rotation-alignment': 'map',
                    'text-pitch-alignment': 'map',
                    'text-rotate': -16
                },
                paint: {
                    'text-color': 'hsl(202, 90%, 16%)',
                    'text-opacity': ['interpolate', ['linear'], ['zoom'], 12, 0, 13, 1, 15, 1, 16, 0],
                    'text-halo-width': 2,
                    'text-halo-color': 'hsl(50, 10%, 93%)'
                }
            });

            // Add ward labels
            map.addLayer({
                id: 'ward-labels',
                type: 'symbol',
                source: 'toronto_ward_centroids',
                'source-layer': 'toronto_ward_centroids',
                layout: {
                    'text-field': ['get', 'area_name'],
                    'text-size': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        10, 4,
                        13, 40
                    ],
                    'text-font': ['notosans'],
                    'text-max-width': 5,
                    'text-line-height': 1.2,
                    'text-allow-overlap': true,
                    'text-ignore-placement': false,
                    'text-rotation-alignment': 'map',
                    'text-pitch-alignment': 'map',
                    'text-rotate': -16
                },
                paint: {
                    'text-color': 'hsl(202, 90%, 16%)',
                    'text-opacity': ['interpolate', ['linear'], ['zoom'], 12, 1, 13, 0],
                    'text-halo-width': 2,
                    'text-halo-color': 'hsl(50, 10%, 93%)'
                }
            });

            // map.addSource('toronto-ortho', {
            //     type: 'raster',
            //     tiles: [
            //         'https://gis.toronto.ca/arcgis/rest/services/basemap/cot_ortho/MapServer/tile/{z}/{y}/{x}'
            //     ],
            //     tileSize: 256,
            //     attribution: 'City of Toronto'
            // });

            // map.addLayer({
            //     id: 'toronto-ortho',
            //     type: 'raster',
            //     source: 'toronto-ortho',
            //     paint: {
            //         "raster-saturation": 0.6,
            //         "raster-opacity": 0.6
            //     }
            // });

        });

    </script>

</body>

</html>
