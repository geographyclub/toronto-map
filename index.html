<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="toronto-events"></div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "standard_toronto.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", async () => {

    // 1. load icon
    const icon = await map.loadImage("assets/markers/finger.png");
    map.addImage("finger-marker", icon.data);

    // 2. load geojson
    const res = await fetch("data/toronto_events.geojson");
    const geojson = await res.json();

    // 3. add source
    map.addSource("toronto-events", {
        type: "geojson",
        data: geojson
    });

    // 4. add symbol layer
    map.addLayer({
        id: "toronto-events",
        type: "symbol",
        source: "toronto-events",

        layout: {
            "icon-image": "finger-marker",
            "icon-size": 0.12,
            "icon-anchor": "bottom",
            "icon-allow-overlap": true,
            "icon-ignore-placement": true
        }
    });

});

    </script>

</body>

</html>
