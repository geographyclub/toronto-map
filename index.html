<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="toronto-events"></div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "standard_toronto.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

map.on("load", async () => {

    // =========================
    // TORONTO EVENTS
    // =========================

async function loadTorontoEvents() {

    const res = await fetch("data/toronto_events.geojson");

    const geojson = await res.json();

    map.addSource("toronto-events", {
        type: "geojson",
        data: geojson
    });

map.addLayer({
    id: "toronto-events",
    type: "symbol",
    source: "toronto-events",

    layout: {
        "text-field": "👇",

        "text-font": ["notosans"],

        "text-size": 40,

        "text-anchor": "bottom",

        "text-allow-overlap": true,
        "text-ignore-placement": true
    },

    paint: {
        "text-color": "#111111",

        "text-halo-color": "#ffffff",
        "text-halo-width": 2
    }
});
    renderTorontoEvents(geojson.features);
}

function renderTorontoEvents(features) {

    const container = document.querySelector("#toronto-events");

    container.innerHTML = "";

    for (const feature of features) {

        const props = feature.properties;

        const card = document.createElement("div");

        card.className = "toronto-event-card";

        card.innerHTML = `
            <div class="toronto-event-title">
                ${props.title || ""}
            </div>

            <div class="toronto-event-location">
                ${props.location_name || ""}
            </div>

            <div class="toronto-event-address">
                ${props.location_address || ""}
            </div>
        `;

        card.addEventListener("click", () => {

            map.flyTo({
                center: feature.geometry.coordinates,
                zoom: 15,
                duration: 1500
            });

        });

        container.appendChild(card);
    }
}

loadTorontoEvents();

});

    </script>

</body>

</html>
