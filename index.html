<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [[-79.6393, 43.5804], [-79.1158, 43.8554]];

        const map = new maplibregl.Map({
            container: "map",
            style: "base.json",
            center: [-79.38245, 43.67831],
            maxBounds: torontoBounds,
            zoom: 12,
            minZoom: 12,
            maxZoom: 18,
            bearing: -16,
            pitch: 25,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", () => {

            // Add neighborhood source
            map.addSource('toronto_neighborhoods', {
                type: 'vector',
                tiles: ['https://torontotechweek.github.io/data/toronto_neighborhoods/{z}/{x}/{y}.pbf']
            });

            // Add neighborhood centroids
            map.addSource('toronto_neighborhoods_centroids', {
                'type': 'geojson',
                'data': 'https://torontotechweek.github.io/data/toronto_neighborhoods_centroids.geojson'
            });

            // Add neighborhood fill
            map.addLayer({
                'id': 'neighborhoods',
                'source': 'toronto_neighborhoods',
                'source-layer': 'toronto_neighborhoods',
                'type': 'fill',
                'paint': {
                    'fill-color': 'hsl(50, 10%, 93%)',
                    'fill-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 1, 17, 1, 18, 0]
                },
                "minzoom": 10,
                "maxzoom": 18
            });

            // Add neighborhood outline
            map.addLayer({
                'id': 'neighborhoods-outlines',
                'source': 'toronto_neighborhoods',
                'source-layer': 'toronto_neighborhoods',
                'type': 'line',
                'paint': {
                    'line-color': 'hsl(202, 90%, 16%)',
                    'line-width': 1,
                    'line-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 1, 17, 1, 18, 0]
                },
                "minzoom": 10,
                "maxzoom": 18
            });

            // Add building source
            // map.addSource('toronto_buildings', {
            //     type: 'vector',
            //     tiles: ['https://torontotechweek.github.io/data/toronto_buildings/{z}/{x}/{y}.pbf']
            // });

            // // Add building outlines
            // map.addLayer({
            //     'id': 'buildings-outline',
            //     'source': 'toronto_buildings',
            //     'source-layer': 'toronto_buildings',
            //     'type': 'line',
            //     'paint': {
            //         'line-color': 'hsl(280, 10%, 40%)',
            //         'line-width': 2,
            //         'line-opacity': ["interpolate", ["linear"], ["zoom"], 15, 0, 18, 1]
            //     },
            //     'minzoom': 15
            // });

            // // Add 3d buildings
            // map.addLayer({
            //     'id': 'buildings',
            //     'source': 'toronto_buildings',
            //     'source-layer': 'toronto_buildings',
            //     'type': 'fill-extrusion',
            //     'paint': {
            //         'fill-extrusion-color': 'hsl(280, 10%, 40%)',
            //         'fill-extrusion-height': [
            //             'case',
            //             ['!=', ['get', 'max_height'], null], ['get', 'max_height'],
            //             ['!=', ['get', 'avg_height'], null], ['get', 'avg_height'],
            //             10
            //         ],
            //         'fill-extrusion-base': 0,
            //         'fill-extrusion-opacity': ['interpolate', ['linear'], ['zoom'], 15, 0, 16, 0.7, 17, 0.7, 18, 0]
            //     },
            //     'minzoom': 15
            // });

            // Add neighborhood labels
            map.addLayer({
                id: 'neighborhood-labels',
                type: 'symbol',
                source: 'toronto_neighborhoods_centroids',
                layout: {
                    'text-field': ['get', 'area_name'],
                    'text-size': [
                        'interpolate',
                        ['exponential', 1.8],
                        ['zoom'],
                        10, 4,
                        16, 72
                    ],
                    'text-font': ['montserrat-semibold'],
                    'text-max-width': 5,
                    'text-line-height': 1,
                    'text-allow-overlap': true,
                    'text-ignore-placement': false,
                    //'text-variable-anchor': ['top', 'bottom', 'left', 'right'],
                    'text-rotation-alignment': 'map',
                    'text-pitch-alignment': 'map',
                    'text-rotate': -16
                },
                paint: {
                    'text-color': 'hsl(202, 90%, 16%)',
                    'text-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 1, 17, 1, 18, 0],
                    'text-halo-width': 2,
                    'text-halo-color': 'hsl(50, 10%, 93%)'
                },
                "minzoom": 10,
                "maxzoom": 18
            });

            // map.addSource('toronto-ortho', {
            //     type: 'raster',
            //     tiles: [
            //         'https://gis.toronto.ca/arcgis/rest/services/basemap/cot_ortho/MapServer/tile/{z}/{y}/{x}'
            //     ],
            //     tileSize: 256,
            //     attribution: 'City of Toronto'
            // });

            // map.addLayer({
            //     id: 'toronto-ortho',
            //     type: 'raster',
            //     source: 'toronto-ortho',
            //     paint: {
            //         "raster-saturation": 0.6,
            //         "raster-opacity": 0.6
            //     }
            // });

        });

    </script>

</body>

</html>
