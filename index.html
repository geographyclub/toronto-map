<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="toronto-events"></div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "imagery_toronto.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", async () => {

            // 1. load markers
            const imageNames = [
                "finger",
                "hatch_diag"
            ];
            for (const name of imageNames) {
                const img = await map.loadImage(
                    `assets/markers/${name}.png`
                );
                if (!map.hasImage(name)) {
                    map.addImage(name, img.data);
                }
            }

            map.on("styleimagemissing", async (e) => {
                const id = e.id;
                try {
                    const img = await map.loadImage(
                        `assets/markers/${id}.png`
                    );
                    if (!map.hasImage(id)) {
                        map.addImage(id, img.data);
                    }
                } catch (err) {
                    console.error(
                        "missing image failed:",
                        id,
                        err
                    );
                }
            });

            // 2. load geojson
            const res = await fetch("data/toronto_events.geojson");
            const geojson = await res.json();

            // 3. add source
            map.addSource("toronto-events", {
                type: "geojson",
                data: geojson
            });

            // 4. add symbol layer
            // map.addLayer({
            //     id: "toronto-events",
            //     type: "symbol",
            //     source: "toronto-events",

            //     layout: {
            //         "icon-image": "finger",
            //         "icon-size": 0.2,
            //         "icon-anchor": "bottom",
            //         "icon-allow-overlap": true,
            //         "icon-ignore-placement": true
            //     }
            // });

// map.addLayer({
//     id: "toronto-events",
//     type: "circle",
//     source: "toronto-events",

//     paint: {
//         "circle-radius": 6,
//         "circle-color": "hsl(0, 0%, 100%)",
//         "circle-stroke-width": 2,
//         "circle-stroke-color": "#04304C"
//     }
// });

            map.on("click", (e) => {
                const features = map.queryRenderedFeatures(
                    e.point
                );
                console.log(features);
            });

//map.showCollisionBoxes = true;

        });

    </script>

</body>

</html>
