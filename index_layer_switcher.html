<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="toronto-events"></div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [
            [-79.67, 43.56],
            [-79.09, 43.88]
        ];

        const map = new maplibregl.Map({
            container: "map",
            style: "toronto.json",
            center: [-79.381394, 43.656482],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 10,
            maxZoom: 18,
            bearing: -16.8,
            pitch: 0,
            fadeDuration: 0,
            hash: true,
            pixelRatio: 2
        });

        map.on("load", async () => {

            // Add address points source
            map.addSource('toronto_address_points', {
                type: 'vector',
                tiles: ['https://geographyclub.github.io/toronto-map/data/toronto_address_points/{z}/{x}/{y}.pbf']
            });

map.addLayer({
    id: "toronto-address-points",
    type: "circle",
    source: "toronto_address_points",
    "source-layer": "toronto_address_points",
    filter: [
        "all",
        ["has", "place_name"],
        ["==", ["get", "address_class_desc"], "Land"]
    ],
    paint: {
        "circle-radius": [
            "interpolate",
            ["linear"],
            ["zoom"],
            12, 1,
            16, 3,
            20, 8
        ],
        "circle-color": "#0b5cad",
        "circle-opacity": [
            "interpolate",
            ["linear"],
            ["zoom"],
            12, 0,
            14, 0.6,
            16, 1
        ],
        "circle-stroke-width": 1,
        "circle-stroke-color": "#ffffff"
    },

    minzoom: 12
});

map.addLayer({
    id: "toronto-address-labels",
    type: "symbol",
    source: "toronto_address_points",
    "source-layer": "toronto_address_points",
    filter: [
        "all",
        ["has", "place_name"],
        ["!=", ["get", "place_name"], "None"]
    ],
    layout: {
        "text-font": [ "notosans" ],
        "text-size": 10,
        "text-field": ["get", "place_name"],
        "text-max-width": 8,
        "text-line-height": 1,
        "icon-anchor": "bottom",
        "text-anchor": "top",
        "icon-allow-overlap": false,
        "text-allow-overlap": false,
        "icon-ignore-placement": false,
        "text-ignore-placement": false
    },
    paint: {
        "text-color": "hsl(202, 90%, 16%)",
        "text-opacity": [
            "interpolate",
            ["linear"],
            ["zoom"],
            15, 0,
            16, 1
        ],
        "text-halo-color": "#ffffff",
        "text-halo-width": 0
    }
});

            // 1. load markers
            const imageNames = [
                "finger",
                "hatch_diag"
            ];
            for (const name of imageNames) {
                const img = await map.loadImage(
                    `assets/markers/${name}.png`
                );
                if (!map.hasImage(name)) {
                    map.addImage(name, img.data);
                }
            }

            map.on("styleimagemissing", async (e) => {
                const id = e.id;
                try {
                    const img = await map.loadImage(
                        `assets/markers/${id}.png`
                    );
                    if (!map.hasImage(id)) {
                        map.addImage(id, img.data);
                    }
                } catch (err) {
                    console.error(
                        "missing image failed:",
                        id,
                        err
                    );
                }
            });

            // 2. load geojson
            const res = await fetch("data/toronto_events.geojson");
            const geojson = await res.json();

            // 3. add source
            map.addSource("toronto-events", {
                type: "geojson",
                data: geojson
            });

            // 4. add symbol layer
            map.addLayer({
                id: "toronto-events",
                type: "symbol",
                source: "toronto-events",

                layout: {
                    "icon-image": "finger",
                    "icon-size": 0.2,
                    "icon-anchor": "bottom",
                    "icon-allow-overlap": true,
                    "icon-ignore-placement": true
                }
            });

const layers = {
    events: [
        "toronto-events"
    ]
};

function createLayerControl() {

    const layerControl = document.createElement("div");

    layerControl.id = "layer-control";

    for (const groupName in layers) {

        const label = document.createElement("label");

        const input = document.createElement("input");

        input.type = "checkbox";
        input.checked = true;

        input.addEventListener("change", () => {

            setGroupVisible(
                groupName,
                input.checked
            );

        });

        label.appendChild(input);

        label.append(
            " " + groupName
        );

        layerControl.appendChild(label);

    }

    document.body.appendChild(layerControl);

}

createLayerControl();

function setGroupVisible(group, visible) {

    layers[group].forEach(id => {

        map.setLayoutProperty(
            id,
            "visibility",
            visible
                ? "visible"
                : "none"
        );

    });

}


            map.on("click", (e) => {
                const features = map.queryRenderedFeatures(
                    e.point
                );
                console.log(features);
            });

//map.showCollisionBoxes = true;

        });

    </script>

</body>

</html>
