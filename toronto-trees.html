<!DOCTYPE html>
<html lang="en">

<head>
    <title>toronto-map</title>
    <meta property="og:description" content="Toronto Map" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>

        const torontoBounds = [[-79.6393, 43.5804], [-79.1158, 43.8554]];

        const map = new maplibregl.Map({
            container: "map",
            style: "toronto-trees.json",
            center: [-79.38245, 43.67831],
            maxBounds: torontoBounds,
            zoom: 16,
            minZoom: 16,
            maxZoom: 18,
            bearing: -16,
            pitch: 25,
            hash: true,
            pixelRatio: 1
        });

        map.on("load", () => {
            
            // Add tree source
            map.addSource('toronto-trees', {
                type: 'vector',
                tiles: ['https://geographyclub.github.io/toronto-map/data/toronto-trees/{z}/{x}/{y}.pbf']
            });

            // Add tree points
            map.addLayer({
                "id": "toronto-trees",
                "source": "toronto-trees",
                "source-layer": "toronto-trees",
                "type": "symbol",
                "layout": {
                    "symbol-placement": "point",
                    "icon-keep-upright": true,
                    "icon-allow-overlap": true,
                    "icon-ignore-placement": true,
                    "icon-anchor": "bottom",
                    "symbol-sort-key": 0,
                    "icon-image": [
                        "concat",
                        "tree_",
                        ["get", "icon_number"]
                    ],
                    "icon-size": 1.5
                },
                "paint": {
                    "icon-color": "hsl(0, 0%, 100%)",
                    "icon-opacity": [
                        "interpolate",
                        ["linear"],
                        ["zoom"],
                        15, 0, 16, 1
                    ]
                },
                minZoom: 16
            });

        });

    </script>

</body>

</html>
